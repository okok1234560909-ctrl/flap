<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy 3D Bird Deluxe</title>
<style>
:root {
  --ground-h: 82px;
  --bird-x: 94px;
  --bird-y: 250px;
  --bird-r: 0deg;
  --cloud-x: 0px;
  --hill-x: 0px;
  --ground-x: 0px;
  --sky-top: hsl(199 95% 68%);
  --sky-mid: hsl(197 95% 78%);
  --sky-low: hsl(113 58% 70%);
  --star-opacity: 0;
  --sun-opacity: 1;
  --skin-main: hsl(43 98% 56%);
  --skin-light: hsl(52 100% 74%);
  --skin-dark: hsl(31 82% 42%);
  --skin-side: hsl(38 86% 48%);
  --skin-wing: hsl(27 90% 50%);
  --skin-wing-dark: hsl(24 70% 38%);
  --skin-cheek: hsla(13 100% 72% / 0.62);
  --skin-beak-a: hsl(31 100% 60%);
  --skin-beak-b: hsl(17 100% 51%);
  --skin-glow: hsla(45 100% 72% / 0.42);
  --skin-eye: hsl(0 0% 7%);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: hsl(216 38% 10%);
  color: white;
}

body {
  display: grid;
  place-items: center;
}

button {
  font: inherit;
}

.app {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: 18px;
}

.game {
  position: relative;
  width: min(94vw, 540px);
  height: min(86vh, 780px);
  height: min(86dvh, 780px);
  min-height: 560px;
  max-height: 780px;
  overflow: hidden;
  border-radius: 30px;
  background:
    linear-gradient(var(--sky-top), var(--sky-mid) 58%, var(--sky-low));
  box-shadow:
    0 34px 88px rgba(0, 0, 0, 0.44),
    inset 0 0 0 3px rgba(255, 255, 255, 0.15);
  user-select: none;
  touch-action: none;
  isolation: isolate;
}

.sky-glow,
.stars,
.clouds,
.hills,
.pipes,
.coins,
.particles,
.ground,
.hud,
.countdown,
.overlay,
.flash {
  position: absolute;
}

.sky-glow {
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(circle at 72% 15%, rgba(255, 246, 184, calc(0.7 * var(--sun-opacity))) 0 4%, transparent 15%),
    radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.25), transparent 34%),
    linear-gradient(rgba(255, 255, 255, 0.08), transparent 36%);
}

.stars {
  inset: 0;
  z-index: 1;
  opacity: var(--star-opacity);
  background-image:
    radial-gradient(circle at 13% 16%, white 0 1px, transparent 2px),
    radial-gradient(circle at 35% 10%, white 0 1px, transparent 2px),
    radial-gradient(circle at 62% 22%, white 0 1px, transparent 2px),
    radial-gradient(circle at 83% 12%, white 0 1px, transparent 2px),
    radial-gradient(circle at 74% 35%, white 0 1px, transparent 2px),
    radial-gradient(circle at 26% 34%, white 0 1px, transparent 2px);
}

.clouds {
  inset: 0;
  z-index: 2;
  opacity: 0.86;
  background-image:
    radial-gradient(circle at 40px 42px, rgba(255, 255, 255, 0.95) 0 20px, transparent 22px),
    radial-gradient(circle at 68px 34px, rgba(255, 255, 255, 0.9) 0 27px, transparent 29px),
    radial-gradient(circle at 102px 46px, rgba(255, 255, 255, 0.92) 0 20px, transparent 22px),
    radial-gradient(circle at 282px 96px, rgba(255, 255, 255, 0.72) 0 18px, transparent 20px),
    radial-gradient(circle at 314px 86px, rgba(255, 255, 255, 0.8) 0 25px, transparent 27px),
    radial-gradient(circle at 348px 99px, rgba(255, 255, 255, 0.72) 0 17px, transparent 19px);
  background-size: 440px 176px;
  background-position: var(--cloud-x) 32px;
}

.hills {
  left: 0;
  right: 0;
  bottom: var(--ground-h);
  height: 190px;
  z-index: 3;
  opacity: 0.95;
  background:
    radial-gradient(ellipse at 82px 155px, hsl(101 46% 45%) 0 88px, transparent 91px),
    radial-gradient(ellipse at 247px 164px, hsl(105 42% 53%) 0 110px, transparent 113px),
    radial-gradient(ellipse at 438px 155px, hsl(98 45% 47%) 0 98px, transparent 101px);
  background-size: 540px 190px;
  background-position: var(--hill-x) 0;
}

.pipes,
.coins,
.particles {
  inset: 0;
  pointer-events: none;
}

.pipes {
  z-index: 5;
}

.coins {
  z-index: 6;
  perspective: 500px;
}

.particles {
  z-index: 9;
}

.pipe-set {
  position: absolute;
  left: 0;
  top: 0;
  width: 74px;
  height: 100%;
  will-change: transform;
}

.pipe {
  position: absolute;
  left: 0;
  width: 74px;
  background:
    linear-gradient(
      90deg,
      hsl(126 60% 28%),
      hsl(122 65% 48%) 18%,
      hsl(116 72% 58%) 42%,
      hsl(123 58% 34%) 78%,
      hsl(126 58% 22%)
    );
  box-shadow:
    inset 9px 0 0 rgba(255, 255, 255, 0.17),
    inset -11px 0 0 rgba(0, 0, 0, 0.17),
    0 10px 20px rgba(0, 0, 0, 0.22);
}

.pipe::before {
  content: "";
  position: absolute;
  inset: 0 12px;
  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.18),
      transparent
    );
}

.pipe.top {
  top: 0;
  border-radius: 0 0 16px 16px;
}

.pipe.bottom {
  bottom: var(--ground-h);
  border-radius: 16px 16px 0 0;
}

.cap {
  position: absolute;
  left: -9px;
  width: 92px;
  height: 28px;
  background:
    linear-gradient(
      90deg,
      hsl(126 55% 25%),
      hsl(120 68% 55%) 22%,
      hsl(116 72% 62%) 48%,
      hsl(123 58% 32%) 82%,
      hsl(126 55% 20%)
    );
  box-shadow:
    inset 8px 0 0 rgba(255, 255, 255, 0.16),
    inset -10px 0 0 rgba(0, 0, 0, 0.18),
    0 6px 12px rgba(0, 0, 0, 0.18);
}

.cap-bottom {
  bottom: -1px;
  border-radius: 0 0 15px 15px;
}

.cap-top {
  top: -1px;
  border-radius: 15px 15px 0 0;
}

.coin {
  position: absolute;
  left: 0;
  top: 0;
  width: 32px;
  height: 32px;
  transform-style: preserve-3d;
  will-change: transform, opacity;
}

.coin-core {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, hsl(56 100% 82%), hsl(45 100% 54%) 45%, hsl(35 93% 43%) 78%);
  box-shadow:
    inset -4px -5px 0 rgba(0, 0, 0, 0.16),
    inset 4px 4px 0 rgba(255, 255, 255, 0.3),
    0 6px 12px rgba(0, 0, 0, 0.22);
  animation: coinSpin 700ms linear infinite;
}

.coin-core::before {
  content: "";
  position: absolute;
  inset: 7px;
  border-radius: 50%;
  border: 2px solid rgba(125, 72, 0, 0.28);
}

.coin-core::after {
  content: "";
  position: absolute;
  left: 11px;
  top: 7px;
  width: 8px;
  height: 16px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.44);
  transform: rotate(22deg);
}

.coin.collected {
  animation: coinCollect 220ms ease-out forwards;
}

.bird-wrap {
  position: absolute;
  left: 0;
  top: 0;
  width: 84px;
  height: 66px;
  z-index: 8;
  perspective: 620px;
  transform:
    translate3d(var(--bird-x), var(--bird-y), 0)
    rotate(var(--bird-r));
  will-change: transform;
}

.bird-model {
  position: relative;
  width: 84px;
  height: 66px;
  transform-style: preserve-3d;
  transform: rotateY(-19deg) rotateX(8deg);
  filter:
    drop-shadow(0 13px 9px rgba(0, 0, 0, 0.25))
    drop-shadow(0 0 12px var(--skin-glow));
}

.body-side,
.body-front,
.body-back,
.body-belly,
.head-front,
.head-back,
.head-side,
.wing-near,
.wing-far,
.beak-top,
.beak-bottom,
.eye,
.eye-shine,
.tail-a,
.tail-b,
.foot-a,
.foot-b,
.cheek,
.brow {
  position: absolute;
  transform-style: preserve-3d;
}

.body-side {
  left: 11px;
  top: 16px;
  width: 49px;
  height: 37px;
  border-radius: 50%;
  background: var(--skin-side);
  transform: translateZ(0);
  box-shadow:
    0 0 0 15px var(--skin-side),
    inset -12px -8px 0 rgba(0, 0, 0, 0.14);
}

.body-front {
  left: 10px;
  top: 15px;
  width: 52px;
  height: 39px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 62% 30%, var(--skin-light), var(--skin-main) 56%, var(--skin-dark));
  transform: translateZ(17px);
}

.body-back {
  left: 9px;
  top: 15px;
  width: 50px;
  height: 38px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 45% 32%, var(--skin-main), var(--skin-dark));
  transform: translateZ(-17px);
}

.body-belly {
  left: 29px;
  top: 31px;
  width: 25px;
  height: 18px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.24);
  transform: translateZ(31px) rotate(-7deg);
}

.head-side {
  left: 42px;
  top: 8px;
  width: 33px;
  height: 33px;
  border-radius: 50%;
  background: var(--skin-side);
  transform: translateZ(3px);
  box-shadow: 0 0 0 10px var(--skin-side);
}

.head-front {
  left: 41px;
  top: 7px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 60% 31%, var(--skin-light), var(--skin-main) 60%, var(--skin-dark));
  transform: translateZ(22px);
}

.head-back {
  left: 40px;
  top: 8px;
  width: 33px;
  height: 33px;
  border-radius: 50%;
  background: var(--skin-dark);
  transform: translateZ(-12px);
}

.eye {
  left: 62px;
  top: 16px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--skin-eye);
  transform: translateZ(37px);
}

.eye-shine {
  left: 65px;
  top: 17px;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: white;
  transform: translateZ(39px);
}

.brow {
  left: 59px;
  top: 12px;
  width: 12px;
  height: 4px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.18);
  transform: translateZ(38px) rotate(-8deg);
}

.cheek {
  left: 53px;
  top: 26px;
  width: 13px;
  height: 8px;
  border-radius: 50%;
  background: var(--skin-cheek);
  transform: translateZ(36px);
}

.beak-top {
  left: 70px;
  top: 20px;
  width: 24px;
  height: 12px;
  background:
    linear-gradient(90deg, var(--skin-beak-a), var(--skin-beak-b));
  clip-path: polygon(0 0, 100% 52%, 0 100%);
  transform: translateZ(26px) rotateY(5deg);
}

.beak-bottom {
  left: 69px;
  top: 29px;
  width: 19px;
  height: 9px;
  background:
    linear-gradient(90deg, hsl(24 95% 45%), hsl(13 90% 45%));
  clip-path: polygon(0 0, 100% 35%, 0 100%);
  transform: translateZ(24px) rotateY(5deg);
  opacity: 0.88;
}

.wing-near {
  left: 14px;
  top: 27px;
  width: 34px;
  height: 20px;
  border-radius: 62% 42% 68% 48%;
  background:
    radial-gradient(circle at 35% 25%, var(--skin-light), var(--skin-wing) 68%);
  transform-origin: 84% 36%;
  transform: translateZ(34px) rotate(-18deg);
  animation: wingNear 250ms ease-in-out infinite alternate;
}

.wing-near::after {
  content: "";
  position: absolute;
  right: 4px;
  bottom: 3px;
  width: 18px;
  height: 5px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.12);
  transform: rotate(-9deg);
}

.wing-far {
  left: 10px;
  top: 27px;
  width: 31px;
  height: 18px;
  border-radius: 62% 42% 68% 48%;
  background: var(--skin-wing-dark);
  opacity: 0.75;
  transform-origin: 84% 36%;
  transform: translateZ(-22px) rotateY(180deg) rotate(-10deg);
  animation: wingFar 285ms ease-in-out infinite alternate;
}

.tail-a,
.tail-b {
  left: 0;
  background:
    linear-gradient(90deg, var(--skin-dark), var(--skin-main));
}

.tail-a {
  top: 24px;
  width: 24px;
  height: 16px;
  clip-path: polygon(0 10%, 100% 0, 78% 52%, 100% 100%, 0 82%);
  transform: translateZ(4px) rotate(-11deg);
}

.tail-b {
  top: 35px;
  width: 22px;
  height: 15px;
  clip-path: polygon(0 20%, 100% 0, 78% 52%, 100% 100%, 0 78%);
  transform: translateZ(-8px) rotate(8deg);
  opacity: 0.84;
}

.foot-a,
.foot-b {
  width: 15px;
  height: 7px;
  border-radius: 999px;
  background: hsl(29 100% 45%);
  transform: translateZ(11px);
}

.foot-a {
  left: 32px;
  top: 53px;
  transform: translateZ(14px) rotate(8deg);
}

.foot-b {
  left: 45px;
  top: 52px;
  transform: translateZ(6px) rotate(-8deg);
  opacity: 0.8;
}

.ground {
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--ground-h);
  z-index: 10;
  background:
    linear-gradient(hsl(39 85% 58%) 0 18px, hsl(31 72% 46%) 18px 100%);
  box-shadow:
    inset 0 8px 0 rgba(255, 255, 255, 0.2),
    0 -12px 24px rgba(0, 0, 0, 0.13);
}

.ground::before {
  content: "";
  position: absolute;
  inset: 0;
  height: 18px;
  background:
    repeating-linear-gradient(
      90deg,
      hsl(93 60% 40%) 0 38px,
      hsl(103 62% 48%) 38px 76px
    );
  background-position: var(--ground-x) 0;
}

.ground::after {
  content: "";
  position: absolute;
  inset: 18px 0 0;
  background:
    radial-gradient(circle at 24px 18px, rgba(110, 70, 30, 0.28) 0 4px, transparent 5px),
    radial-gradient(circle at 90px 42px, rgba(110, 70, 30, 0.22) 0 5px, transparent 6px),
    radial-gradient(circle at 160px 28px, rgba(110, 70, 30, 0.22) 0 4px, transparent 5px);
  background-size: 210px 70px;
  background-position: var(--ground-x) 0;
}

.hud {
  left: 16px;
  right: 16px;
  top: 14px;
  z-index: 18;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: start;
  pointer-events: none;
}

.stat-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.stat-row.right {
  justify-content: flex-end;
}

.score-box,
.best-box,
.coin-box {
  min-width: 78px;
  padding: 8px 11px;
  border-radius: 17px;
  background: rgba(0, 0, 0, 0.22);
  border: 1px solid rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(8px);
  text-align: center;
  box-shadow: 0 9px 22px rgba(0, 0, 0, 0.16);
}

.score-box {
  min-width: 96px;
}

.label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.82;
}

.score-value,
.best-value,
.coin-value {
  display: block;
  font-size: 28px;
  font-weight: 950;
  line-height: 1;
  text-shadow: 0 3px 0 rgba(0, 0, 0, 0.18);
}


.countdown {
  inset: 0;
  z-index: 24;
  display: grid;
  place-items: center;
  pointer-events: none;
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 150ms ease, transform 150ms ease;
}

.countdown.visible {
  opacity: 1;
  transform: scale(1);
}

.countdown-text {
  font-size: clamp(72px, 18vw, 130px);
  font-weight: 1000;
  letter-spacing: -0.08em;
  text-shadow:
    0 8px 0 rgba(0, 0, 0, 0.2),
    0 22px 38px rgba(0, 0, 0, 0.25);
}

.countdown-text.pop {
  animation: countdownPop 360ms ease-out;
}

.overlay {
  inset: 0;
  z-index: 30;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(0, 0, 0, 0.25);
  opacity: 0;
  pointer-events: none;
  transition: opacity 170ms ease;
}

.overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.panel {
  width: min(94%, 405px);
  max-height: min(92vh, 700px);
  max-height: min(92dvh, 700px);
  overflow: auto;
  padding: 22px;
  border-radius: 30px;
  text-align: center;
  background: rgba(13, 27, 43, 0.86);
  border: 1px solid rgba(255, 255, 255, 0.24);
  box-shadow: 0 28px 72px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(13px);
}

.title {
  font-size: 38px;
  font-weight: 1000;
  letter-spacing: -0.06em;
  margin-bottom: 7px;
}

.message {
  margin: 0 0 17px;
  line-height: 1.42;
  color: rgba(255, 255, 255, 0.86);
}

.panel-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  margin-bottom: 15px;
}

.panel-stat {
  padding: 10px 8px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.09);
  border: 1px solid rgba(255, 255, 255, 0.12);
}

.panel-stat strong {
  display: block;
  font-size: 22px;
  line-height: 1.05;
}

.panel-stat span {
  display: block;
  margin-top: 3px;
  font-size: 11px;
  opacity: 0.72;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.button-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
  margin-bottom: 15px;
}

.play-button {
  appearance: none;
  border: 0;
  border-radius: 999px;
  padding: 13px 24px;
  color: hsl(220 38% 14%);
  background:
    linear-gradient(180deg, hsl(54 100% 73%), hsl(36 100% 55%));
  font-weight: 950;
  font-size: 16px;
  cursor: pointer;
  box-shadow:
    0 9px 0 hsl(28 77% 37%),
    0 18px 28px rgba(0, 0, 0, 0.28);
  transform: translateY(0);
}

.play-button:active {
  transform: translateY(5px);
  box-shadow:
    0 4px 0 hsl(28 77% 37%),
    0 12px 20px rgba(0, 0, 0, 0.26);
}


.skin-panel {
  margin-top: 2px;
  text-align: left;
}

.skin-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 0 2px 9px;
  font-size: 13px;
  font-weight: 850;
  color: rgba(255, 255, 255, 0.88);
}

.skin-title-row span:last-child {
  color: hsl(47 100% 68%);
}

.skin-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 9px;
}

.skin-card {
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(255, 255, 255, 0.08);
  color: white;
  border-radius: 19px;
  padding: 10px;
  display: grid;
  grid-template-columns: 42px 1fr;
  gap: 10px;
  align-items: center;
  text-align: left;
  cursor: pointer;
}

.skin-card.selected {
  border-color: hsl(48 100% 64%);
  background: rgba(255, 218, 79, 0.16);
}

.skin-card.locked {
  opacity: 0.82;
}

.skin-card:active {
  transform: translateY(2px);
}

.skin-swatch {
  width: 40px;
  height: 32px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 64% 31%, var(--swatch-light), var(--swatch-main) 58%, var(--swatch-dark));
  box-shadow:
    inset -7px -5px 0 rgba(0, 0, 0, 0.14),
    0 7px 13px rgba(0, 0, 0, 0.18);
  position: relative;
}

.skin-swatch::before {
  content: "";
  position: absolute;
  right: -10px;
  top: 9px;
  width: 16px;
  height: 10px;
  clip-path: polygon(0 0, 100% 50%, 0 100%);
  background: var(--swatch-beak);
}

.skin-swatch::after {
  content: "";
  position: absolute;
  right: 3px;
  top: 8px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: hsl(0 0% 8%);
}

.skin-name {
  font-size: 13px;
  font-weight: 850;
}

.skin-state {
  margin-top: 2px;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.66);
}

.skin-panel.shake {
  animation: shake 240ms ease-in-out;
}

.flash {
  inset: 0;
  z-index: 25;
  background: white;
  opacity: 0;
  pointer-events: none;
}

.flash.show {
  animation: flashHit 220ms ease-out;
}

.particle {
  position: absolute;
  left: 0;
  top: 0;
  border-radius: 999px;
  pointer-events: none;
  will-change: transform, opacity;
}

.particle.feather {
  background:
    linear-gradient(90deg, var(--skin-light), var(--skin-wing));
  border-radius: 70% 30% 65% 35%;
}

.particle.spark {
  background:
    radial-gradient(circle, hsl(54 100% 76%), hsl(37 100% 50%));

  set(key, value) {
    try {

}

function ensureAudio() {
  if (state.muted) {
    return null
  }

  const AudioClass = window.AudioContext || window.webkitAudioContext

  if (!AudioClass) {
    return null
  }

  if (!audioContext) {
    audioContext = new AudioClass()
  }

  if (audioContext.state === "suspended") {
    audioContext.resume()
  }

  return audioContext
}

function tone(freq, duration, type, gainValue, delay) {
  if (state.muted) {
    return
  }

  const ctx = ensureAudio()

  if (!ctx) {
    return
  }

  const start = ctx.currentTime + (delay || 0)
  const oscillator = ctx.createOscillator()
  const gain = ctx.createGain()

  oscillator.type = type || "sine"
  oscillator.frequency.setValueAtTime(freq, start)
  gain.gain.setValueAtTime(0.0001, start)
  gain.gain.exponentialRampToValueAtTime(gainValue || 0.045, start + 0.012)
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration)

  oscillator.connect(gain)
  gain.connect(ctx.destination)
  oscillator.start(start)
  oscillator.stop(start + duration + 0.03)
}

function runRatGag() {
  const wrap   = document.getElementById("ratBar")
  const fill   = document.getElementById("ratFill")
  const status = document.getElementById("ratStatus")

  // reset
  fill.style.width = "0%"
  status.className = "rat-bar-status"
  status.textContent = "connecting to server..."
  wrap.classList.add("visible")

  const steps = [
    [5,   "initialising payload..."],
    [18,  "bypassing antivirus..."],
    [34,  "injecting rootkit..."],
    [51,  "stealing passwords..."],
    [67,  "downloading ur files..."],
    [82,  "almost there..."],
    [95,  "finishing up..."],
    [100, null]
  ]

  let i = 0
  function next() {
    if (!state.evilMode) { wrap.classList.remove("visible"); return }
    if (i >= steps.length) return
    const [pct, msg] = steps[i]
    fill.style.width = pct + "%"
    if (msg) status.textContent = msg
    i++
    if (pct < 100) {
      setTimeout(next, 420 + Math.random() * 280)
    } else {
      setTimeout(() => {
        status.className = "rat-bar-status done"
        status.textContent = "UR WHOLE PC IS MINE..."
        setTimeout(() => {
          wrap.style.transition = "opacity 1.2s ease"
          wrap.style.opacity = "0"
          setTimeout(() => {
            wrap.classList.remove("visible")
            wrap.style.transition = "opacity 0.3s ease"
            wrap.style.opacity = ""
            fill.style.width = "0%"
            status.className = "rat-bar-status"
            status.textContent = "connecting to server..."
          }, 1300)
        }, 2200)
      }, 300)
    }
  }
  setTimeout(next, 600)
}

  if (state.phase === "menu" || state.phase === "gameover") {
    beginCountdown()

  if (state.phase !== "playing") {
    return

  state.velocity = state.evilMode ? state.flapPower * 1.7 : state.flapPower
  spawnParticles("feather", state.birdX + 13, state.birdY + 30, state.evilMode ? 11 : 5)

  state.countdown -= dt

    setCountdownLabel("3")

    setCountdownLabel("2")
  } else if (state.countdown > 0) {
    setCountdownLabel("1")
  } else if (state.countdown > -0.42) {
    setCountdownLabel("GO")
  } else {

  const playableHeight = state.height - state.ground
  const wantedGap = state.evilMode ? clamp(210 - state.score * 0.08, 170, 210) : clamp(190 - state.score * 0.45, 154, 190)
  const gap = Math.round(Math.max(state.evilMode ? 168 : 144, Math.min(wantedGap, playableHeight - 150)))
  const minCenter = gap * 0.5 + 64
  const maxCenter = playableHeight - gap * 0.5 - 68
  const drift = clamp(134 - state.score * 0.55, 92, 134)
  const low = Math.max(minCenter, state.lastGapCenter - drift)
  const high = Math.min(maxCenter, state.lastGapCenter + drift)
  const center = Math.round(low <= high ? rand(low, high) : playableHeight * 0.5)
  const topHeight = Math.round(center - gap * 0.5)
  const bottomTop = Math.round(center + gap * 0.5)
  state.lastGapCenter = center
  state.pipeCount += 1

  const set = document.createElement("div")
  set.className = "pipe-set"

  const top = document.createElement("div")
  top.className = "pipe top"
  top.style.height = topHeight + "px"

  const topCap = document.createElement("div")
  topCap.className = "cap cap-bottom"
  top.appendChild(topCap)

  const bottom = document.createElement("div")
  bottom.className = "pipe bottom"
  bottom.style.top = bottomTop + "px"

  const bottomCap = document.createElement("div")
  bottomCap.className = "cap cap-top"
  bottom.appendChild(bottomCap)

  set.appendChild(top)
  set.appendChild(bottom)
  pipesLayer.appendChild(set)

  const pipe = {
    x: state.width + 42,
    topHeight,
    bottomTop,
    gapCenter: center,
    gap,
    passed: false,
    el: set
  }

  state.pipes.push(pipe)

  const coinRoll = state.evilMode ? 1 : state.pipeCount <= 2 ? 1 : 0.82

  if (Math.random() < coinRoll) {
    makeCoin(pipe)
  }

  if (state.evilMode && Math.random() < 0.35) {
    makeCoin(pipe)
  }
}

function makeCoin(pipe) {
  const margin = 42
  const minY = pipe.topHeight + margin
  const maxY = pipe.bottomTop - margin - 32
  const y = Math.round(minY <= maxY ? rand(minY, maxY) : pipe.gapCenter - 16)
  const el = document.createElement("div")
  el.className = "coin"

  const core = document.createElement("div")
  core.className = "coin-core"
  el.appendChild(core)
  coinsLayer.appendChild(el)

  const coin = {
    pipe,
    offsetX: state.pipeWidth * 0.5 - 16,
    x: pipe.x,
    y,
    size: 32,
    el
  }

  state.coins.push(coin)
}

function updatePipes(dt) {
  state.spawnTimer -= dt
  state.spawnEvery = state.evilMode ? Math.max(0.24, state.evilSpawnEvery - state.score * 0.00005) : clamp(1.54 - state.score * 0.003, 1.34, 1.54)

  if (state.spawnTimer <= 0) {
    makePipe()
    state.spawnTimer += state.spawnEvery
  }

  state.speed = state.evilMode ? state.evilBaseSpeed + Math.min(state.score * 10, state.evilMaxSpeedBonus) : 144 + Math.min(state.score * 2.1, 48)

  for (const pipe of state.pipes) {
    pipe.x -= state.speed * dt
    pipe.el.style.transform = "translate3d(" + pipe.x + "px, 0, 0)"

    if (!pipe.passed && pipe.x + state.pipeWidth < state.birdX + 8) {
      const scoreGain = state.evilMode ? state.evilScoreMultiplier : 1
      pipe.passed = true
      state.score += scoreGain

      if (state.evilMode) {
        state.bankCoins += state.evilPipeBounty
        state.runCoins += state.evilPipeBounty
        updateHud()
      } else {
        scoreValue.textContent = String(state.score)
      }

      playScore()
      updateMood()
    }
  }

  while (state.pipes.length && state.pipes[0].x + state.pipeWidth < -130) {
    const oldPipe = state.pipes.shift()
    oldPipe.el.remove()
  }
}

function collectCoin(coin, index, loud) {
  const coinCenterX = coin.x + coin.size * 0.5
  const coinCenterY = coin.y + coin.size * 0.5
  const value = state.evilMode ? state.evilCoinValue : 1
  state.bankCoins += value
  state.runCoins += value

  if (!state.evilMode) {
    saveProfile()
  }

  updateHud()

  if (loud) {
    playCoin()
    spawnParticles("spark", coinCenterX, coinCenterY, state.evilMode ? 6 : 12)
  }

  coin.el.classList.add("collected")
  setTimeout(() => coin.el.remove(), 230)
  state.coins.splice(index, 1)
}

function updateCoins() {
  const birdCenterX = state.birdX + 31
  const birdCenterY = state.birdY + 25

  for (let index = state.coins.length - 1; index >= 0; index -= 1) {
    const coin = state.coins[index]
    coin.x = coin.pipe.x + coin.offsetX
    coin.el.style.transform = "translate3d(" + coin.x + "px, " + coin.y + "px, 0)"

    const coinCenterX = coin.x + coin.size * 0.5
    const coinCenterY = coin.y + coin.size * 0.5
    const dx = birdCenterX - coinCenterX
    const dy = birdCenterY - coinCenterY
    const collected = state.evilMode || dx * dx + dy * dy < 940

    if (collected) {
      collectCoin(coin, index, true)
    } else if (coin.x < -90) {
      coin.el.remove()
      state.coins.splice(index, 1)
    }
  }
}

function evilFlightTarget() {
  const coin = state.coins.find(item => item.x > state.birdX - 44)

  if (coin) {
    return clamp(coin.y - 9, 8, state.height - state.ground - 50)
  }

  const pipe = state.pipes.find(item => item.x + state.pipeWidth > state.birdX)

  if (pipe) {
    return clamp(pipe.gapCenter - 25, 8, state.height - state.ground - 50)
  }

  return clamp(Math.round(state.height * 0.38), 8, state.height - state.ground - 50)
}

function updateEvilFlight(dt) {
  const target = evilFlightTarget()
  const ease = clamp(dt * 26, 0, 1)
  const previousY = state.birdY
  state.birdY += (target - state.birdY) * ease
  state.birdY = clamp(state.birdY, -26, state.height - state.ground - 34)
  state.velocity = clamp((state.birdY - previousY) / Math.max(dt, 0.001), -720, 720)
}

function updateEvilEffects(dt) {
  if (!state.evilMode) {
    return
  }

  state.evilPulse += dt
  document.documentElement.style.setProperty("--evil-rot", state.evilPulse * 80 + "deg")

  if (state.phase === "playing" && state.evilPulse > 0.55) {
    state.evilPulse = 0
    spawnParticles("spark", state.birdX + 24, state.birdY + 18, 3)
  }
}

function birdHitbox() {
  return {
    left: state.birdX + 10,
    right: state.birdX + 48,
    top: state.birdY + 8,
    bottom: state.birdY + 42
  }
}

function checkCollision() {
  if (state.evilMode) {
    return false
  }

  const bird = birdHitbox()
  const groundTop = state.height - state.ground

  if (bird.bottom >= groundTop) {
    state.birdY = groundTop - 42
    return true
  }

  if (bird.top <= -4) {
    state.birdY = -10
    state.velocity = Math.max(0, state.velocity)
  }

  for (const pipe of state.pipes) {
    const pipeLeft = pipe.x + 5
    const pipeRight = pipe.x + state.pipeWidth - 5
    const overlapsX = bird.right > pipeLeft && bird.left < pipeRight

    if (overlapsX) {
      const hitsTop = bird.top < pipe.topHeight - 2
      const hitsBottom = bird.bottom > pipe.bottomTop + 2

      if (hitsTop || hitsBottom) {
        return true
      }
    }
  }

  return false
}

function endGame() {
  if (state.phase !== "playing") {
    return
  }

  state.phase = "gameover"
  state.lastScore = state.score

  if (state.score > state.best) {
    state.best = state.score
  }

  saveProfile()
  updateHud()
  playHit()
  spawnParticles("hit", state.birdX + 31, state.birdY + 25, 18)
  flash.classList.remove("show")
  void flash.offsetWidth
  flash.classList.add("show")

  const medal = state.score >= 100 ? "Diamond" : state.score >= 50 ? "Gold" : state.score >= 25 ? "Silver" : state.score >= 10 ? "Bronze" : "None"
  const coinText = state.runCoins === 1 ? "1 coin" : state.runCoins + " coins"
  showOverlay("Game Over", "Score " + state.score + " · " + coinText + " · Medal " + medal, "Restart")
  renderSkinGrid()
}

function updateBackground(dt) {
  const base = state.phase === "playing" ? state.speed : 30
  state.cloudX -= base * 0.12 * dt
  state.hillX -= base * 0.28 * dt
  state.groundX -= base * 0.88 * dt

  if (state.cloudX < -440) {
    state.cloudX += 440
  }

  if (state.hillX < -540) {
    state.hillX += 540
  }

  if (state.groundX < -210) {
    state.groundX += 210
  }

  game.style.setProperty("--cloud-x", state.cloudX + "px")
  game.style.setProperty("--hill-x", state.hillX + "px")
  game.style.setProperty("--ground-x", state.groundX + "px")
}

function updateMood() {
  const mood = clamp(state.score / 42, 0, 1)
  const hueTop = 199 - mood * 35
  const hueMid = 197 - mood * 42
  const hueLow = 113 - mood * 16
  const topLight = 68 - mood * 35
  const midLight = 78 - mood * 38
  const lowLight = 70 - mood * 18
  game.style.setProperty("--sky-top", "hsl(" + hueTop + " 95% " + topLight + "%)")
  game.style.setProperty("--sky-mid", "hsl(" + hueMid + " 90% " + midLight + "%)")
  game.style.setProperty("--sky-low", "hsl(" + hueLow + " 48% " + lowLight + "%)")
  game.style.setProperty("--star-opacity", String(clamp((mood - 0.45) * 1.8, 0, 0.72)))
  game.style.setProperty("--sun-opacity", String(clamp(1 - mood * 1.15, 0.1, 1)))
}

function spawnParticles(kind, x, y, count) {
  for (let index = 0; index < count; index += 1) {
    const el = document.createElement("div")
    el.className = "particle " + kind
    const size = kind === "feather" ? rand(5, 9) : rand(4, 8)
    el.style.width = size + "px"
    el.style.height = (kind === "feather" ? size * 0.62 : size) + "px"
    particlesLayer.appendChild(el)

    const speed = kind === "feather" ? rand(40, 130) : rand(75, 190)
    const angle = kind === "feather" ? rand(2.55, 3.65) : rand(0, Math.PI * 2)

    state.particles.push({
      el,
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rand(20, 95),
      life: kind === "feather" ? rand(0.42, 0.7) : rand(0.36, 0.62),
      maxLife: 0,
      rot: rand(0, 360),
      spin: rand(-380, 380),
      gravity: kind === "feather" ? 360 : 520
    })

    const particle = state.particles[state.particles.length - 1]
    particle.maxLife = particle.life
  }
}

function updateParticles(dt) {
  for (let index = state.particles.length - 1; index >= 0; index -= 1) {
    const particle = state.particles[index]
    particle.life -= dt

    if (particle.life <= 0) {
      particle.el.remove()
      state.particles.splice(index, 1)
      continue
    }

    particle.vy += particle.gravity * dt
    particle.x += particle.vx * dt
    particle.y += particle.vy * dt
    particle.rot += particle.spin * dt
    const alpha = clamp(particle.life / particle.maxLife, 0, 1)
    particle.el.style.opacity = String(alpha)
    particle.el.style.transform = "translate3d(" + particle.x + "px, " + particle.y + "px, 0) rotate(" + particle.rot + "deg)"
  }
}

function render() {
  const rotation = clamp(state.velocity / 13.5, -26, 50)
  game.style.setProperty("--bird-y", state.birdY + "px")
  game.style.setProperty("--bird-r", rotation + "deg")
}

function idleBird(dt) {
  state.idleTime += dt
  state.birdY = Math.round(state.height * 0.38 + Math.sin(state.idleTime * 3.1) * 9)
  state.velocity = Math.cos(state.idleTime * 3.1) * 75
}

function handleResize() {
  if (state.resizeLock) {
    return
  }

  const oldWidth = state.width
  const oldHeight = state.height
  measure()

  const majorChange = Math.abs(oldWidth - state.width) > 26 || Math.abs(oldHeight - state.height) > 54

  if (majorChange && (state.phase === "playing" || state.phase === "countdown")) {
    state.resizeLock = true
    resetRound({
      title: "Screen Adjusted",
      message: "Restarted the round so the next gap stays fair.",
      button: "Start Game"
    })
    setTimeout(() => {
      state.resizeLock = false
    }, 260)
    return
  }

  if (state.phase !== "playing" && state.phase !== "gameover") {
    state.birdY = Math.round(state.height * 0.38)
  }

  render()
}

function tick(time) {
  if (!state.lastTime) {
    state.lastTime = time
  }

  const dt = Math.min((time - state.lastTime) / 1000, 0.034)
  state.lastTime = time

  updateBackground(dt)

  if (state.phase === "playing") {
    if (state.evilMode) {
      updateEvilFlight(dt)
    } else {
      state.velocity = clamp(state.velocity + state.gravity * dt, -640, state.maxFall)
      state.birdY += state.velocity * dt
    }

    updatePipes(dt)
    updateCoins()

    if (checkCollision()) {
      endGame()
    }
  } else if (state.phase === "countdown") {
    idleBird(dt)
    updateCountdown(dt)
  } else if (state.phase !== "gameover") {
    idleBird(dt)
  }

  updateParticles(dt)
  render()
  requestAnimationFrame(tick)
}

playButton.addEventListener("click", event => {
  event.stopPropagation()
  beginCountdown()
})

evilButton.addEventListener("click", toggleEvilMode)


game.addEventListener("pointerdown", event => {
  const target = event.target

  if (target.closest && target.closest("button")) {
    return
  }

  if (overlay.classList.contains("visible")) {
    return
  }

  flap()
})

window.addEventListener("keydown", event => {
  if (event.repeat) {
    return
  }

  const key = event.key.toLowerCase()

  if (key === " " || key === "arrowup" || key === "w") {
    event.preventDefault()
    flap()
  }
})

window.addEventListener("resize", handleResize)

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", handleResize)
}

applySkin()
updateEvilButton()
resetRound({ showOverlay: true })
renderSkinGrid()
requestAnimationFrame(tick)
</script>
</body>
</html>
